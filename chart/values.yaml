# ============================================================================
# mcp-tank-operator values
# ============================================================================
# This server has no Azure surface — it only talks to the tank-operator
# orchestrator's /api/internal/sessions/* API using the pod's projected SA
# token. No UAMI, no ExternalSecret, no KV-mounted credentials.

image:
  repository: romainecr.azurecr.io/mcp-tank-operator
  # SHA-pinned. .github/workflows/build.yml rewrites this tag on every push to
  # main via a [skip ci] follow-up commit. Quoted so all-digit short-SHAs
  # don't get parsed as floats.
  tag: "fb60b01"
  pullPolicy: IfNotPresent

# Port the Python uvicorn server binds (0.0.0.0) and the Service targets.
# Reached directly via the Service — no kube-rbac-proxy sidecar fronts it;
# authorization is the auth.romaine.life JWT validated by the orchestrator.
upstreamPort: 8080

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 256Mi

# In-cluster URL to the tank-operator orchestrator. The MCP server uses a
# dedicated projected service account token minted for the tank-operator
# audience to authenticate to /api/internal/sessions/*.
orchestratorUrl: http://tank-operator.tank-operator.svc:80
