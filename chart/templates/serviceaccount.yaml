# SA used by both containers. kube-rbac-proxy uses this SA's API-audience token to call
# TokenReview on incoming bearer tokens (via system:auth-delegator in
# auth-delegator.yaml). The Python server uses a projected token with the
# tank-operator audience to authenticate to /api/internal/* — no
# workload-identity annotation needed (no Azure surface).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-tank-operator
  namespace: mcp-tank-operator
