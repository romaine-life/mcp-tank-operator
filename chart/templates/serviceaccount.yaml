# SA used by both containers. kube-rbac-proxy uses this SA's token to call
# TokenReview on incoming bearer tokens (via system:auth-delegator in
# auth-delegator.yaml). The Python server uses the auto-mounted SA token to
# authenticate to the orchestrator's /api/internal/* endpoints — no
# workload-identity annotation needed (no Azure surface).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-tank-operator
  namespace: mcp-tank-operator
