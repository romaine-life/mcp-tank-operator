# SA the mcp-tank-operator pod runs as. The Python server uses a projected
# token with the tank-operator audience (see deployment.yaml) to authenticate
# to /api/internal/* — no workload-identity annotation needed (no Azure
# surface), and no TokenReview/auth-delegator grant now that there is no
# kube-rbac-proxy sidecar.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-tank-operator
  namespace: mcp-tank-operator
