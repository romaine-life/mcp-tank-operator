# system:auth-delegator lets the mcp-tank-operator SA call TokenReview on
# inbound bearer tokens. kube-rbac-proxy needs this to validate the session
# pod's projected SA token on each inbound MCP request.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-tank-operator-auth-delegator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: mcp-tank-operator
    namespace: mcp-tank-operator
